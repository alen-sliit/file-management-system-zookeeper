# Unique path avoids shaded JAR picking another dependency's root-level *.properties.
# NTP server for all nodes
ntp.server=pool.ntp.org

# Log WARN when |offset| exceeds this (noticeable drift).
drift.threshold.ms=100

# ERROR severity: large skew only. Typical NTP stays below this; sub-second offsets are WARN.
skew.error.threshold.ms=10000

# CRITICAL — broken clock / no meaningful sync.
skew.critical.threshold.ms=60000

# Reject coordinated writes when |offset| is this high or more.
skew.write.reject.threshold.ms=30000

# Polling interval in ms (demos)
poll.interval.ms=5000
